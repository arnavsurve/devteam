id: qa
version: 1
description: Verify the current implementation and return proof-backed findings.
inputs:
  required:
    - workspace
    - goal
    - artifacts_dir
  optional:
    - acceptance_criteria
    - context
instructions:
  prompt_file: prompt.md
policy:
  result_format: structured_v1
  allow_code_changes: false
capabilities:
  artifact_types:
    - screenshot
    - command_output
    - log
